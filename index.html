<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Stimulation Simulator MAX - Final Fix</title>
    <style>
        #version-tag {
    position: absolute;
    bottom: 10px;
    right: 10px;
    font-family: sans-serif;
    font-size: 12px;
    color: #211d1d;
    z-index: 1000;
}


        body {
            margin: 0; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #fff;
            overflow: hidden; font-family: 'Arial Black', sans-serif; user-select: none;
        }

        #bg-wheel {
            position: absolute; width: 150vw; height: 150vw;
            background: conic-gradient(#f0f0f0 0deg 18deg, #e0e0e0 18deg 36deg);
            border-radius: 50%; z-index: -2; display: none;
            animation: spin 20s linear infinite; opacity: 0.5;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #news-ticker {
            position: absolute; top: 0; width: 100%; background: black;
            color: white; white-space: nowrap; padding: 5px 0; font-size: 14px;
            display: none; z-index: 100;
        }
        #news-text { display: inline-block; animation: scroll-news 20s linear infinite; }
        @keyframes scroll-news { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        #ui-layer { text-align: center; z-index: 50; background: rgba(255,255,255,0.85); padding: 25px; border-radius: 25px; border: 2px solid #333; }
        
        #main-button { 
            padding: 15px 35px; font-size: 18px; cursor: pointer; border-radius: 8px; 
            border: 2px solid #333; background: #f9f9f9;
        }
        #main-button.upgraded { background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; border: none; }
        
        #score-display { font-size: 42px; margin: 5px 0; color: #333; }

        .upgrade-container { display: flex; gap: 12px; margin-top: 25px; flex-wrap: wrap; justify-content: center; max-width: 450px; }
        .upgrade-box {
            width: 80px; height: 80px; border: 2px solid #333; border-radius: 18px;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: white; position: relative;
        }
        .upgrade-box.visible { display: flex; }
        .upgrade-box.bought { display: none !important; }
        .upgrade-box.disabled { opacity: 0.2; cursor: not-allowed; }
        
        .cost { font-size: 11px; font-weight: bold; margin-top: 5px; }
        .count {
            position: absolute; top: -8px; right: -8px; background: #ff4757;
            color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px;
            display: flex; align-items: center; justify-content: center; border: 2px solid white;
        }

        #press-container { position: absolute; bottom: 5%; display: none; flex-direction: column; align-items: center; }
        .press-part { width: 140px; height: 45px; background: #555; border: 4px solid #222; }
        #teddy { font-size: 45px; margin: 10px 0; transition: transform 0.1s; }

        .dvd-logo { position: absolute; width: 85px; height: 45px; z-index: 1; display: flex; align-items: center; justify-content: center; background: #000; color: #fff; border-radius: 50%; font-size: 12px; font-weight: bold; }
        .rain { position: absolute; width: 2px; height: 45px; background: rgba(52, 152, 219, 0.6); z-index: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="bg-wheel"></div>
    <div id="news-ticker"><div id="news-text">+++ BREAKING NEWS: DVD STIMULATION SYSTEM ONLINE +++ OGNI TOCCO DEL BORDO VALE +1 +++ BUON CLICKING +++</div></div>

    <div id="ui-layer">
        <div id="click-value-display" style="font-size: 12px; color: #666; height: 15px;"></div>
        <button id="main-button">Click me</button>
        <div id="score-display"><span id="score">0</span> stimulation</div>
        <div id="combo-text" style="color: #ff4757; font-size: 18px; min-height: 25px;"></div>

        <div class="upgrade-container">
            <div id="upg-dvd" class="upgrade-box visible"><span style="font-size:30px">💿</span><span class="cost">15</span><div class="count" style="display:none">0</div></div>
            <div id="upg-rain" class="upgrade-box"><span style="font-size:30px">🌧️</span><span class="cost">100</span></div>
            <div id="upg-news" class="upgrade-box"><span style="font-size:30px">🗞️</span><span class="cost">250</span></div>
            <div id="upg-btn" class="upgrade-box"><span style="font-size:30px">💎</span><span class="cost">400</span></div>
            <div id="upg-crit" class="upgrade-box"><span style="font-size:30px">🎯</span><span class="cost">600</span></div>
            <div id="upg-wheel" class="upgrade-box"><span style="font-size:30px">🎡</span><span class="cost">800</span></div>
            <div id="upg-press" class="upgrade-box"><span style="font-size:30px">🦾</span><span class="cost">1000</span><div class="count" style="display:none">0</div></div>
            <div id="upg-combo" class="upgrade-box"><span style="font-size:30px">🔥</span><span class="cost">1500</span></div>
        </div>
    </div>

    <div id="press-container">
        <div id="press-top" class="press-part"></div>
        <div id="teddy">🧸</div>
        <div class="press-part"></div>

        </div>

    <div id="version-tag">v.1 beta</div>
    </div>

    <script>
        let score = 0;
        let critProb = 0;
        let hasNews = false, hasRain = false, hasCombo = false, hasBtnUpg = false;
        let dvds = [];
        let combo = 1;
        let lastClick = 0;

        const costs = { dvd: 15, rain: 100, news: 250, btn: 400, crit: 600, wheel: 800, press: 1000, combo: 1500 };
        const counts = { dvd: 0, press: 0 };

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            
            // Logica sblocchi
            if (score >= 30 || counts.dvd > 0) document.getElementById('upg-rain').classList.add('visible');
            if (score >= 100 || hasRain) document.getElementById('upg-news').classList.add('visible');
            if (score >= 200 || hasNews) document.getElementById('upg-btn').classList.add('visible');
            if (score >= 350 || hasBtnUpg) document.getElementById('upg-crit').classList.add('visible');
            if (score >= 500) document.getElementById('upg-wheel').classList.add('visible');
            if (score >= 700) document.getElementById('upg-press').classList.add('visible');
            if (score >= 1000) document.getElementById('upg-combo').classList.add('visible');

            document.querySelectorAll('.upgrade-box').forEach(box => {
                const type = box.id.replace('upg-', '');
                if (box.classList.contains('bought')) return;
                box.classList.toggle('disabled', score < costs[type]);
                const costEl = box.querySelector('.cost');
                if(costEl) costEl.innerText = Math.floor(costs[type]);
                const countEl = box.querySelector('.count');
                if(countEl && counts[type] > 0) {
                    countEl.style.display = 'flex';
                    countEl.innerText = counts[type];
                }
            });
        }

        document.getElementById('main-button').addEventListener('click', () => {
            let gain = 1;
            if (Math.random() < critProb) gain = 10;
            if (hasCombo) {
                const now = Date.now();
                if (now - lastClick < 600) combo++; else combo = 1;
                lastClick = now;
                document.getElementById('combo-text').innerText = combo > 1 ? `Combo x${combo}` : '';
                gain *= combo;
            }
            score += gain;
            updateUI();
        });

        // ACQUISTI
        document.getElementById('upg-dvd').addEventListener('click', () => {
            if(score >= costs.dvd) { score -= costs.dvd; counts.dvd++; costs.dvd *= 1.15; createDVD(); updateUI(); }
        });

        document.getElementById('upg-rain').addEventListener('click', () => {
            if(score >= costs.rain) { score -= costs.rain; hasRain = true; document.getElementById('upg-rain').classList.add('bought'); updateUI(); }
        });

        document.getElementById('upg-news').addEventListener('click', () => {
            if(score >= costs.news) { score -= costs.news; hasNews = true; document.getElementById('news-ticker').style.display = 'block'; document.getElementById('upg-news').classList.add('bought'); updateUI(); }
        });

        document.getElementById('upg-btn').addEventListener('click', () => {
            if(score >= costs.btn) { score -= costs.btn; hasBtnUpg = true; document.getElementById('main-button').classList.add('upgraded'); document.getElementById('upg-btn').classList.add('bought'); updateUI(); }
        });

        document.getElementById('upg-crit').addEventListener('click', () => {
            if(score >= costs.crit) { score -= costs.crit; critProb = 0.15; document.getElementById('upg-crit').classList.add('bought'); updateUI(); }
        });

        document.getElementById('upg-wheel').addEventListener('click', () => {
            if(score >= costs.wheel) { score -= costs.wheel; document.getElementById('bg-wheel').style.display = 'block'; document.getElementById('upg-wheel').classList.add('bought'); updateUI(); }
        });

        document.getElementById('upg-press').addEventListener('click', () => {
            if(score >= costs.press) { score -= costs.press; counts.press++; costs.press *= 1.6; document.getElementById('press-container').style.display = 'flex'; updateUI(); }
        });

        document.getElementById('upg-combo').addEventListener('click', () => {
            if(score >= costs.combo) { score -= costs.combo; hasCombo = true; document.getElementById('upg-combo').classList.add('bought'); updateUI(); }
        });

        function createDVD() {
            const dvd = { 
                el: document.createElement('div'), 
                x: Math.random() * (window.innerWidth - 100), 
                y: Math.random() * (window.innerHeight - 100), 
                vx: 3, vy: 3 
            };
            dvd.el.className = 'dvd-logo'; dvd.el.innerText = 'DVD';
            document.body.appendChild(dvd.el); dvds.push(dvd);
        }

        function runPress() {
            if (counts.press > 0) {
                const top = document.getElementById('press-top');
                const teddy = document.getElementById('teddy');
                top.style.transform = 'translateY(55px)';
                setTimeout(() => {
                    teddy.style.transform = 'scaleY(0.1)';
                    score += 150 * counts.press;
                    updateUI();
                    setTimeout(() => {
                        top.style.transform = 'translateY(0)';
                        teddy.style.transform = 'scaleY(1)';
                    }, 200);
                }, 200);
            }
            setTimeout(runPress, Math.max(800, 4000 / counts.press));
        }
        runPress();

        function animate() {
            dvds.forEach(d => {
                d.x += d.vx; d.y += d.vy;
                let touched = false;

                if (d.x <= 0 || d.x + 85 >= window.innerWidth) { d.vx *= -1; touched = true; }
                if (d.y <= 0 || d.y + 45 >= window.innerHeight) { d.vy *= -1; touched = true; }
                
                if (touched) {
                    score += 1; // AGGIUNGE PUNTI
                    d.el.style.background = `hsl(${Math.random()*360},70%,50%)`;
                    updateUI(); // AGGIORNA INTERFACCIA ISTANTANEAMENTE
                }

                d.el.style.left = d.x + 'px'; d.el.style.top = d.y + 'px';
            });

            if(hasRain && Math.random() > 0.95) {
                const drop = document.createElement('div');
                drop.className = 'rain'; drop.style.left = Math.random() * window.innerWidth + 'px';
                drop.style.top = '-50px'; document.body.appendChild(drop);
                drop.animate([{ top: '-50px' }, { top: window.innerHeight + 'px' }], { duration: 1500 }).onfinish = () => {
                    drop.remove(); score += 0.5; updateUI();
                };
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
